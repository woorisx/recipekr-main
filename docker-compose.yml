services:
  app:
    image: ${DOCKERHUB_USERNAME:-recipekr}/recipekr:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recipekr-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-demo}
      - JAVA_OPTS=${JAVA_OPTS:--Xms128m -Xmx256m}
      - PYTHONIOENCODING=utf-8
      - PYTHONUTF8=1
      - TIDB_URL
      - TIDB_USERNAME
      - TIDB_PASSWORD
      - RDS_URL
      - RDS_USERNAME
      - RDS_PASSWORD
      - GEMINI_API_KEY
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_DEFAULT_REGION
      - AWS_S3_BUCKET
    restart: unless-stopped
