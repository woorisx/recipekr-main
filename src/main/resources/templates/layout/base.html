<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | 냉장고 레시피'">냉장고 레시피</title>
    <meta name="description" th:content="${pageDesc} ?: '냉장고 속 재료로 만드는 AI 레시피 추천 서비스'">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="apple-touch-icon" th:href="@{/favicon.svg}">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
          rel="stylesheet">

    <!-- Global CSS -->
    <link rel="stylesheet" th:href="@{/css/global.css?v=20}">

    <!-- Chatbot CSS -->
    <link rel="stylesheet" th:href="@{/css/chatbot.css?v=2}">

    <!-- Page-specific CSS slot -->
    <th:block th:replace="${extraCss} ?: ~{}"></th:block>
</head>
<body>

<!-- ─── NAVBAR ─── -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNavbar">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-icon"><img src="/images/icons/plate.svg" alt="로고"></span>
            <span class="brand-text">냉장고 레시피</span>
        </a>
        <button class="navbar-toggler border-0 custom-toggler" type="button"
                data-bs-toggle="offcanvas" data-bs-target="#navbarContent" aria-controls="navbarContent">
            <div class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>
        <div class="offcanvas-lg offcanvas-end offcanvas-dark flex-grow-1" tabindex="-1" id="navbarContent" aria-labelledby="offcanvasNavbarLabel">
            <div class="offcanvas-body d-flex flex-column flex-lg-row align-items-lg-center justify-content-lg-between w-100">
                <ul class="navbar-nav desktop-nav-pill me-auto mb-2 mb-lg-0 gap-2">
                <li class="nav-item">
                    <a class="nav-link active" href="/#hero" id="nav-home">
                        <i class="bi bi-house-door me-1"></i>홈
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <!-- 레시피 추천도 메인 페이지 내의 기능으로 설명되는 앵커로 처리하거나, 별도 페이지로 이동. 
                         요청하신 "부드러운 이동"을 위해 앵커 동작 추가 -->
                    <a class="nav-link" href="/recipe/recommend">
                        <i class="bi bi-stars me-1"></i>레시피 추천
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/#features" id="nav-features">
                        <i class="bi bi-grid-3x3-gap me-1"></i>서비스 특징
                    </a>
                </li>
            </ul>
            <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2 mt-3 mt-lg-0 mobile-nav-actions">
                <div sec:authorize="isAnonymous()" class="d-flex flex-column flex-lg-row gap-2">
                    <a th:href="@{/auth/login}" class="btn btn-outline-light btn-sm px-3">
                        <i class="bi bi-box-arrow-in-right me-1"></i>로그인
                    </a>
                    <a th:href="@{/auth/signup}" class="btn btn-accent btn-sm px-3">
                        <i class="bi bi-person-plus me-1"></i>회원가입
                    </a>
                </div>
                <div sec:authorize="isAuthenticated()" class="d-flex flex-column flex-lg-row align-items-lg-center gap-3">
                    <span class="text-white-50">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="principal.nickname">사용자</span>님
                    </span>

                    <div class="d-flex flex-column flex-lg-row gap-2">
                        <!-- 마이페이지 버튼 -->
                        <a th:href="@{/mypage}" class="btn btn-outline-info btn-sm px-3">
                            <i class="bi bi-person-badge me-1"></i>마이페이지
                        </a>

                        <!-- 관리자 대시보드 버튼 (admin 계정 전용) -->
                        <div sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/admin/dashboard}" class="btn btn-warning btn-sm px-3 text-dark fw-bold w-100">
                                <i class="bi bi-speedometer2 me-1"></i>관리자
                            </a>
                        </div>

                        <a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm px-3">
                            <i class="bi bi-box-arrow-right me-1"></i>로그아웃
                        </a>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </div>
</nav>

<!-- ─── MAIN CONTENT ─── -->
<main th:replace="${content}">
    <!-- 각 페이지의 콘텐츠가 여기에 삽입됩니다 -->
</main>

<!-- ─── FOOTER ─── -->
<footer class="footer mt-auto py-4">
    <div class="container text-center">
        <p class="mb-1 text-muted">
            <span class="brand-gradient-text fw-semibold">냉장고 레시피</span>
            &nbsp;—&nbsp; AI가 추천하는 오늘의 레시피
        </p>
        <p class="mb-0 text-muted small">
            &copy; 2026 RecipeKR. Built with Spring Boot 3 &amp; Python AI
        </p>
    </div>
</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmQjhsBm21bJRZWWJGVJQAOqPdgu"
        crossorigin="anonymous"></script>

<!-- Page-specific JS slot -->
<th:block th:replace="${extraJs} ?: ~{}"></th:block>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. 현재 URL에 맞는 헤더 메뉴에 활성(Active) 둥근 사각형 표시
        const currentPath = window.location.pathname;
        document.querySelectorAll('.navbar-nav .nav-link').forEach(link => {
            const linkPath = new URL(link.href).pathname;
            if (linkPath === currentPath) {
                link.classList.add('active');
            }
        });

        // 2. 홈 버튼 및 로고 클릭 시 부드러운 페이지 전환 (Fade-out)
        const homeLinks = document.querySelectorAll('a[href="/"]');
        homeLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                // 이미 메인 페이지(/)에 있다면 화면만 맨 위로 부드럽게 스크롤 (풀페이지 기능 유지)
                if (currentPath === '/') {
                    e.preventDefault();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // 다른 페이지에서 홈으로 갈 때는 암전(Fade-out) 효과 적용
                e.preventDefault();
                const targetUrl = link.getAttribute('href');
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 250);
            });
    });
</script>

<!-- Chatbot Fragment -->
<div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
