<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="chatbot">
    <!-- Chatbot Toggle Button -->
    <button class="chatbot-toggler animate-float" id="chatbotToggler" aria-label="챗봇 열기">
        <i class="bi bi-robot fs-3"></i>
    </button>

    <!-- Chatbot Window -->
    <div class="chatbot-window shadow-lg" id="chatbotWindow">
        <div class="chatbot-header d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-robot fs-4"></i>
                <h6 class="mb-0 fw-bold">AI 레시피 도우미</h6>
            </div>
            <button class="btn-close btn-close-white" id="chatbotClose" aria-label="닫기"></button>
        </div>
        <div class="chatbot-body" id="chatbotBody">
            <div class="chat-message bot">
                <div class="msg-bubble">
                    안녕하세요! 무엇을 도와드릴까요? 레시피에 대해 궁금한 점을 물어보세요!
                </div>
            </div>
        </div>
        <div class="chatbot-footer">
            <form id="chatbotForm" class="d-flex gap-2" onsubmit="event.preventDefault(); sendChatMessage();">
                <input type="text" id="chatInput" class="form-control" placeholder="메시지를 입력하세요..." autocomplete="off">
                <button type="submit" class="btn btn-primary" id="chatSubmitBtn">
                    <i class="bi bi-send-fill"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggler = document.getElementById('chatbotToggler');
            const windowEl = document.getElementById('chatbotWindow');
            const closeBtn = document.getElementById('chatbotClose');
            const bodyEl = document.getElementById('chatbotBody');
            const inputEl = document.getElementById('chatInput');
            const submitBtn = document.getElementById('chatSubmitBtn');

            // 챗봇 열기/닫기
            toggler.addEventListener('click', () => {
                windowEl.classList.toggle('show');
                if(windowEl.classList.contains('show')) {
                    inputEl.focus();
                }
            });

            closeBtn.addEventListener('click', () => {
                windowEl.classList.remove('show');
            });

            // 메시지 전송
            window.sendChatMessage = async function() {
                const message = inputEl.value.trim();
                if (!message) return;

                // 유저 메시지 추가
                appendMessage(message, 'user');
                inputEl.value = '';
                submitBtn.disabled = true;

                // 로딩 인디케이터 추가
                const loadingId = 'loading-' + Date.now();
                appendLoading(loadingId);

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ message: message })
                    });
                    
                    removeElement(loadingId);
                    
                    if (response.ok) {
                        const data = await response.json();
                        appendMessage(data.response || '응답을 받지 못했습니다.', 'bot');
                    } else {
                        appendMessage('오류가 발생했습니다. 다시 시도해주세요.', 'bot');
                    }
                } catch (error) {
                    removeElement(loadingId);
                    appendMessage('네트워크 오류가 발생했습니다.', 'bot');
                } finally {
                    submitBtn.disabled = false;
                    inputEl.focus();
                }
            };

            function appendMessage(text, sender) {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'chat-message ' + sender;
                msgDiv.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div>`;
                bodyEl.appendChild(msgDiv);
                bodyEl.scrollTop = bodyEl.scrollHeight;
            }

            function appendLoading(id) {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'chat-message bot';
                msgDiv.id = id;
                msgDiv.innerHTML = `
                    <div class="msg-bubble">
                        <div class="loading-dots">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                `;
                bodyEl.appendChild(msgDiv);
                bodyEl.scrollTop = bodyEl.scrollHeight;
            }

            function removeElement(id) {
                const el = document.getElementById(id);
                if (el) el.remove();
            }

            function escapeHtml(unsafe) {
                return unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;")
                    .replace(/\n/g, "<br>");
            }
        });
    </script>
</div>
</body>
</html>
