<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 추천 결과 | 냉장고 레시피</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css?v=20}">
    <link rel="stylesheet" th:href="@{/css/recipe.css?v=3}">
</head>
<body>

<!-- ─── NAVBAR ─── -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNavbar">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-icon"><img src="/images/icons/plate.svg" alt="로고"></span>
            <span class="brand-text">냉장고 레시피</span>
        </a>
        <button class="navbar-toggler border-0 custom-toggler" type="button"
                data-bs-toggle="offcanvas" data-bs-target="#navbarContent" aria-controls="navbarContent">
            <div class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>
        <div class="offcanvas-lg offcanvas-end offcanvas-dark flex-grow-1" tabindex="-1" id="navbarContent" aria-labelledby="offcanvasNavbarLabel">
            <div class="offcanvas-body d-flex flex-column flex-lg-row align-items-lg-center justify-content-between w-100">
                <ul class="navbar-nav desktop-nav-pill me-auto mb-2 mb-lg-0 gap-2">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            <i class="bi bi-house-door me-1"></i>홈
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/recipe/recommend}">
                            <i class="bi bi-stars me-1"></i>레시피 추천
                        </a>
                    </li>
                </ul>
                <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2 mt-3 mt-lg-0 mobile-nav-actions">
                    <div sec:authorize="isAnonymous()" class="d-flex flex-column flex-lg-row gap-2">
                        <a th:href="@{/auth/login}" class="btn btn-outline-light btn-sm px-3">
                            <i class="bi bi-box-arrow-in-right me-1"></i>로그인
                        </a>
                        <a th:href="@{/auth/signup}" class="btn btn-accent btn-sm px-3">
                            <i class="bi bi-person-plus me-1"></i>회원가입
                        </a>
                    </div>
                    <div sec:authorize="isAuthenticated()" class="d-flex flex-column flex-lg-row align-items-lg-center gap-3">
                        <span class="text-white-50">
                            <i class="bi bi-person-circle me-1"></i>
                            <span sec:authentication="principal.nickname">사용자</span>님
                        </span>
                        <div class="d-flex flex-column flex-lg-row gap-2">
                            <a th:href="@{/mypage}" class="btn btn-outline-info btn-sm px-3">
                                <i class="bi bi-person-badge me-1"></i>마이페이지
                            </a>
                            <div sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/admin/dashboard}" class="btn btn-warning btn-sm px-3 text-dark fw-bold w-100">
                                    <i class="bi bi-speedometer2 me-1"></i>관리자
                                </a>
                            </div>
                            <a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm px-3">
                                <i class="bi bi-box-arrow-right me-1"></i>로그아웃
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- ─── MAIN CONTENT ─── -->
<main>
<div class="container py-5" style="max-width:760px;">

    <!-- 헤더 -->
    <div class="d-flex align-items-center mb-4 gap-3">
        <a th:href="@{/recipe/recommend(open=true)}" class="btn btn-back text-nowrap">
            <i class="bi bi-arrow-left me-1"></i>다시 입력
        </a>
        <div>
            <h1 class="result-title fw-bold mb-0 fs-4">🍳 AI 추천 레시피</h1>
            <small style="color:rgba(255,255,255,0.5);">
                재료: <span style="color:#e2e8f0;" th:text="${ingredients}"></span>
                &nbsp;|&nbsp; 건강유형: <span style="color:#e2e8f0;" th:text="${healthType}"></span>
            </small>
        </div>
    </div>

    <!-- 에러 발생 시 -->
    <div th:if="${errorMsg != null}" class="card-dark p-5 empty-state" style="border: 1px solid rgba(239, 68, 68, 0.3);">
        <i class="bi bi-exclamation-triangle fs-1 d-block mb-3 text-danger"></i>
        <h5 class="text-white mb-2">AI 레시피 생성 중 오류가 발생했습니다</h5>
        <p style="color:rgba(255,255,255,0.6);" th:text="${errorMsg}"></p>
        <a th:href="@{/recipe/recommend(open=true)}" class="btn btn-back mt-2 d-inline-block">← 다시 시도하기</a>
    </div>

    <!-- 에러는 없고 추천 결과도 없을 때 -->
    <div th:if="${errorMsg == null and #lists.isEmpty(results)}" class="card-dark p-5 empty-state">
        <i class="bi bi-emoji-frown fs-1 d-block mb-3"></i>
        <p style="color:rgba(255,255,255,0.6);">추천 결과가 없습니다. 재료를 더 추가하거나 건강 유형을 변경해 보세요.</p>
        <a th:href="@{/recipe/recommend(open=true)}" class="btn btn-back mt-2 d-inline-block">← 다시 입력하기</a>
    </div>

    <!-- 추천 카드 목록 -->
    <div th:each="recipe : ${results}" class="card-dark recipe-card p-4 mb-3 shadow">
        <div class="d-flex align-items-start gap-3">
            <span class="badge-rank" th:text="${recipe['rank']}"></span>
            <div class="w-100">
                <!-- 제목 + 뱃지 -->
                <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                    <h5 class="mb-0 fw-bold text-white" th:text="${recipe['title']}"></h5>
                    <span class="badge-health" th:text="${recipe['health_type']}"></span>
                    <span class="badge-cal">
                        <i class="bi bi-fire me-1"></i>
                        <span th:text="${recipe['calories']}"></span> kcal
                    </span>
                </div>
                <!-- 재료 -->
                <p style="color:rgba(255,255,255,0.55); font-size:.9rem;" class="mb-2">
                    <i class="bi bi-basket me-1"></i>
                    <span th:text="${recipe['ingredients']}"></span>
                </p>
                <!-- 조리법 -->
                <p class="mb-3 text-white-75" style="font-size:.9rem; line-height:1.7; color:rgba(255,255,255,0.8);"
                   th:text="${recipe['recipe_text']}"></p>
                <!-- 유사도 점수 바 -->
                <div class="d-flex align-items-center gap-2 mt-2">
                    <small style="color:rgba(255,255,255,0.45); cursor:help;" 
                           title="선택한 주재료와 건강 목표에 이 레시피가 얼마나 부합하는지를 나타내는 AI 신뢰도 점수입니다.">
                        AI 매칭도 <i class="bi bi-info-circle"></i>
                    </small>
                    <div class="score-bar flex-grow-1">
                        <div class="score-fill"
                             th:style="'width:' + ${(recipe['score'] * 100)} + '%'"></div>
                    </div>
                    <small style="color:rgba(255,255,255,0.45);"
                           th:text="${#numbers.formatDecimal(recipe['score'] * 100, 1, 1) + '%'}"></small>
                </div>
            </div>
        </div>
    </div>

</div>
</main>

<!-- ─── FOOTER ─── -->
<footer class="footer mt-auto py-4">
    <div class="container text-center">
        <p class="mb-1 text-muted">
            <span class="brand-gradient-text fw-semibold">냉장고 레시피</span>
            &nbsp;—&nbsp; AI가 추천하는 오늘의 레시피
        </p>
        <p class="mb-0 text-muted small">&copy; 2026 RecipeKR. Built with Spring Boot 3 &amp; Python AI</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.addEventListener('scroll', () => {
        document.getElementById('mainNavbar').classList.toggle('scrolled', window.scrollY > 30);
    });

    // ── 오프캔버스 햄버거 메뉴 애니메이션 ──
    const offcanvasNavbar = document.getElementById('navbarContent');
    const customToggler = document.querySelector('.custom-toggler');
    if (offcanvasNavbar && customToggler) {
        offcanvasNavbar.addEventListener('show.bs.offcanvas', () => customToggler.classList.add('open'));
        offcanvasNavbar.addEventListener('hide.bs.offcanvas', () => customToggler.classList.remove('open'));
    }
</script>
</body>
</html>
